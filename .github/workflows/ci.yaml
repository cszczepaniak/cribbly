name: CI
on:
    pull_request:
    push:
        branches:
            - main

env:
    NODE_VERSION: "22"

jobs:
    unit-tests:
        runs-on: ubuntu-latest
        name: Unit Tests
        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - name: Run Tests
              run: go test -v ./...
    build:
        runs-on: ubuntu-latest
        name: Build
        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - run: go build

    verify-go-mod:
        runs-on: ubuntu-latest
        name: Verify Go Vendor
        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - name: Verify Go Vendor
              uses: ./.github/actions/verify_code_consistency
              with:
                  cmd: |
                    go mod tidy
                    go mod vendor

    verify-go:
        runs-on: ubuntu-latest
        name: Verify Go Code Consistency
        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - run: go install golang.org/x/tools/cmd/goimports@latest

            - name: Verify Go Formatting
              uses: ./.github/actions/verify_code_consistency
              with:
                  cmd: make format-go

    verify-templ:
        runs-on: ubuntu-latest
        name: Verify Templ Code Consistency
        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - name: Verify Templ Formatting
              uses: ./.github/actions/verify_code_consistency
              with:
                  cmd: make format-templ

            - name: Verify Templ Generation
              uses: ./.github/actions/verify_code_consistency
              with:
                  cmd: make generate-templ

    verify-tailwind:
        runs-on: ubuntu-latest
        name: Verify Tailwind
        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-node@v4

            - name: Install Node Modules
              run: npm install

            - name: Verify Tailwind
              uses: ./.github/actions/verify_code_consistency
              with:
                  cmd: make tailwind

    frontend-quality:
        runs-on: ubuntu-latest
        name: Frontend — typecheck, lint, format
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Prettier
              run: npm run format:check

    frontend-test:
        runs-on: ubuntu-latest
        name: Frontend — tests
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm run test:run

    frontend-build:
        runs-on: ubuntu-latest
        name: Frontend — build (Vite + Tailwind)
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
